<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星语展示</title>
<style>
  :root {
    --bg: #020408;
    --deep: #050d1a;
    --accent: #6ee7f7;
    --gold: #f7c948;
    --rose: #f76f8e;
    --mist: rgba(110,231,247,0.12);
    --panel-bg: rgba(5,13,26,0.95);
    --text: #e8f4f8;
    --sub: #7aa8b8;
    --border: rgba(110,231,247,0.18);
    --font-display: 'Georgia', 'STSong', serif;
    --font-ui: 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── CANVAS BACKGROUND ── */
  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── GEAR BUTTON ── */
  #gearBtn {
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 100;
    width: 38px;
    height: 38px;
    background: rgba(5,13,26,0.6);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: border-color .3s, background .3s;
  }
  #gearBtn:hover { border-color: var(--accent); background: rgba(110,231,247,0.1); }
  #gearBtn svg { width: 18px; height: 18px; fill: var(--sub); transition: fill .3s, transform .6s; }
  #gearBtn:hover svg { fill: var(--accent); transform: rotate(60deg); }

  /* ── LOGIN OVERLAY ── */
  #loginOverlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(2,4,8,0.85);
    backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  #loginOverlay.show { opacity: 1; pointer-events: all; }
  .login-box {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 40px;
    width: 320px;
    text-align: center;
  }
  .login-box h2 { font-size: 16px; color: var(--accent); letter-spacing: 2px; margin-bottom: 24px; font-weight: 400; }
  .login-box input {
    width: 100%;
    background: rgba(110,231,247,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    padding: 10px 14px;
    font-family: var(--font-ui);
    outline: none;
    transition: border-color .2s;
    margin-bottom: 16px;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box .err { font-size: 12px; color: var(--rose); min-height: 16px; margin-bottom: 12px; }
  .btn-primary {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #1a4a5a, #0d2a3a);
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background .2s, box-shadow .2s;
  }
  .btn-primary:hover { background: linear-gradient(135deg, #1e5a6e, #102f42); box-shadow: 0 0 16px rgba(110,231,247,0.2); }
  .btn-cancel {
    margin-top: 10px;
    background: none;
    border: none;
    color: var(--sub);
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .btn-cancel:hover { color: var(--text); }

  /* ── ADMIN PANEL ── */
  #adminPanel {
    position: fixed;
    inset: 0;
    z-index: 150;
    background: rgba(2,4,8,0.92);
    backdrop-filter: blur(20px);
    display: none;
    flex-direction: column;
  }
  #adminPanel.show { display: flex; }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-header h1 { font-size: 15px; color: var(--accent); letter-spacing: 3px; font-weight: 400; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  .panel-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* LEFT: quote list */
  .quote-list-pane {
    width: 380px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane-title {
    padding: 16px 20px 10px;
    font-size: 11px;
    color: var(--sub);
    letter-spacing: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .quote-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
  }
  .quote-list::-webkit-scrollbar { width: 4px; }
  .quote-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .quote-item {
    background: rgba(110,231,247,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .quote-item:hover, .quote-item.selected { border-color: var(--accent); background: rgba(110,231,247,0.08); }
  .quote-item .qi-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .quote-item .qi-meta {
    font-size: 11px;
    color: var(--sub);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .mode-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    border: 1px solid;
  }
  .mode-nebula { color: #a78fff; border-color: #a78fff44; background: #a78fff11; }
  .mode-rain { color: #6ee7f7; border-color: #6ee7f744; background: #6ee7f711; }
  .mode-orbit { color: #f7c948; border-color: #f7c94844; background: #f7c94811; }
  .mode-pulse { color: #f76f8e; border-color: #f76f8e44; background: #f76f8e11; }
  .mode-drift { color: #6effa0; border-color: #6effa044; background: #6effa011; }
  .mode-aurora { color: #ff9f7f; border-color: #ff9f7f44; background: #ff9f7f11; }

  .qi-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--sub);
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.del:hover { border-color: var(--rose); color: var(--rose); }

  .add-btn-wrap { padding: 12px; flex-shrink: 0; }
  .btn-add {
    width: 100%;
    padding: 10px;
    background: rgba(110,231,247,0.06);
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--sub);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(110,231,247,0.1); }

  /* RIGHT: editor */
  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px 28px;
    gap: 18px;
  }
  .editor-pane h2 { font-size: 12px; color: var(--sub); letter-spacing: 2px; font-weight: 400; flex-shrink: 0; }

  .form-group { display: flex; flex-direction: column; gap: 7px; }
  .form-group label { font-size: 11px; color: var(--sub); letter-spacing: 1px; }
  .form-group textarea {
    background: rgba(110,231,247,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    padding: 12px 14px;
    font-family: var(--font-display);
    line-height: 1.8;
    outline: none;
    resize: none;
    transition: border-color .2s;
    flex: 1;
  }
  .form-group textarea:focus { border-color: var(--accent); }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .mode-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .mode-card:hover { border-color: var(--accent); background: rgba(110,231,247,0.06); }
  .mode-card.active { border-color: var(--accent); background: rgba(110,231,247,0.1); }
  .mode-card .mc-icon { font-size: 20px; }
  .mode-card .mc-name { font-size: 12px; color: var(--text); }
  .mode-card .mc-desc { font-size: 10px; color: var(--sub); }

  .multi-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--sub);
  }
  .toggle {
    width: 36px;
    height: 20px;
    background: rgba(110,231,247,0.1);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
  }
  .toggle.on { background: rgba(110,231,247,0.3); border-color: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--sub);
    transition: left .2s, background .2s;
  }
  .toggle.on::after { left: 18px; background: var(--accent); }

  .editor-actions { display: flex; gap: 10px; flex-shrink: 0; }
  .btn-save {
    padding: 9px 24px;
    background: linear-gradient(135deg, #1a4a5a, #0d2a3a);
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .2s;
  }
  .btn-save:hover { box-shadow: 0 0 16px rgba(110,231,247,0.25); }
  .btn-preview {
    padding: 9px 20px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--sub);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-preview:hover { border-color: var(--gold); color: var(--gold); }
  .btn-logout {
    padding: 9px 16px;
    background: none;
    border: 1px solid rgba(247,111,142,0.3);
    border-radius: 8px;
    color: rgba(247,111,142,0.7);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--rose); color: var(--rose); }

  /* ── DISPLAY LAYER ── */
  #displayLayer {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    overflow: hidden;
  }

  /* mode: nebula — large centered, glow pulse */
  .text-nebula {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-display);
    font-size: clamp(22px, 4vw, 56px);
    color: #fff;
    text-align: center;
    max-width: 80vw;
    line-height: 1.7;
    text-shadow: 0 0 40px rgba(110,231,247,0.6), 0 0 80px rgba(110,231,247,0.3), 0 0 120px rgba(167,143,255,0.3);
    animation: nebulaPulse 4s ease-in-out infinite;
  }
  @keyframes nebulaPulse {
    0%,100% { opacity:.85; text-shadow: 0 0 40px rgba(110,231,247,.6), 0 0 80px rgba(110,231,247,.3); }
    50% { opacity:1; text-shadow: 0 0 60px rgba(110,231,247,1), 0 0 120px rgba(167,143,255,.6), 0 0 180px rgba(110,231,247,.3); }
  }

  /* mode: rain — falling from top */
  .text-rain {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-display);
    font-size: clamp(20px, 3.5vw, 48px);
    color: var(--accent);
    text-align: center;
    max-width: 80vw;
    line-height: 1.8;
    animation: rainFall 6s ease-in-out infinite;
    text-shadow: 0 0 20px rgba(110,231,247,0.5);
  }
  @keyframes rainFall {
    0% { top: -20%; opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { top: 110%; opacity: 0; }
  }

  /* mode: orbit — rotate around center */
  .orbit-wrapper {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: orbitRotate 20s linear infinite;
  }
  .text-orbit {
    font-family: var(--font-display);
    font-size: clamp(16px, 2.5vw, 36px);
    color: var(--gold);
    text-align: center;
    max-width: 70vw;
    line-height: 1.8;
    text-shadow: 0 0 30px rgba(247,201,72,0.5);
    transform: translateY(-28vh);
  }
  @keyframes orbitRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .orbit-wrapper .text-orbit { animation: orbitCounter 20s linear infinite; }
  @keyframes orbitCounter { from { transform: translateY(-28vh) rotate(0deg); } to { transform: translateY(-28vh) rotate(-360deg); } }

  /* mode: pulse — scale breathe */
  .text-pulse {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-display);
    font-size: clamp(24px, 4.5vw, 64px);
    color: var(--rose);
    text-align: center;
    max-width: 80vw;
    line-height: 1.7;
    animation: pulseBreath 3s ease-in-out infinite;
    text-shadow: 0 0 40px rgba(247,111,142,0.6);
  }
  @keyframes pulseBreath {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .8; }
    50% { transform: translate(-50%,-50%) scale(1.08); opacity: 1; }
  }

  /* mode: drift — slow float */
  .text-drift {
    position: absolute;
    font-family: var(--font-display);
    font-size: clamp(18px, 3vw, 42px);
    color: #6effa0;
    text-align: center;
    max-width: 75vw;
    line-height: 1.8;
    text-shadow: 0 0 30px rgba(110,255,160,0.5);
    animation: drift 18s ease-in-out infinite;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) rotate(-1deg); opacity:.7; }
    25%  { transform: translate(3vw,-4vh) rotate(1deg); opacity:1; }
    50%  { transform: translate(-2vw,3vh) rotate(-0.5deg); opacity:.85; }
    75%  { transform: translate(4vw,2vh) rotate(1.5deg); opacity:1; }
    100% { transform: translate(0,0) rotate(-1deg); opacity:.7; }
  }

  /* mode: aurora — color shift + float */
  .text-aurora {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-display);
    font-size: clamp(22px, 3.8vw, 52px);
    text-align: center;
    max-width: 80vw;
    line-height: 1.7;
    animation: auroraColor 6s ease-in-out infinite, auroraFloat 8s ease-in-out infinite;
    filter: drop-shadow(0 0 20px currentColor);
  }
  @keyframes auroraColor {
    0%   { color: #6ee7f7; }
    16%  { color: #a78fff; }
    33%  { color: #f76f8e; }
    50%  { color: #f7c948; }
    66%  { color: #6effa0; }
    83%  { color: #ff9f7f; }
    100% { color: #6ee7f7; }
  }
  @keyframes auroraFloat {
    0%,100% { transform: translate(-50%,-50%) translateY(0); }
    50% { transform: translate(-50%,-50%) translateY(-20px); }
  }

  /* multi mode */
  .text-multi-item {
    position: absolute;
    font-family: var(--font-display);
    line-height: 1.7;
    text-align: center;
    max-width: 60vw;
  }

  /* particle stars */
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    pointer-events: none;
    animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--lo,.1); transform: scale(1); }
    50% { opacity: var(--hi,.8); transform: scale(1.4); }
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(5,13,26,0.9);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--accent);
    z-index: 999;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* empty state */
  #emptyState {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
    z-index: 5;
  }
  #emptyState .es-icon { font-size: 48px; opacity: .3; }
  #emptyState p { font-size: 14px; color: var(--sub); opacity: .6; letter-spacing: 1px; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- Stars -->
<div id="starsContainer" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></div>

<!-- Empty state -->
<div id="emptyState">
  <div class="es-icon">✦</div>
  <p>暂无内容 · 请管理员添加语句</p>
</div>

<!-- Display layer -->
<div id="displayLayer"></div>

<!-- Gear -->
<button id="gearBtn" title="管理">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61
    l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81
    c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33
    c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12
    s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96
    c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54
    c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61
    L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
  </svg>
</button>

<!-- Login -->
<div id="loginOverlay">
  <div class="login-box">
    <h2>管 理 员 登 录</h2>
    <input type="password" id="pwdInput" placeholder="请输入密码" />
    <div class="err" id="loginErr"></div>
    <button class="btn-primary" id="loginBtn">进 入</button>
    <button class="btn-cancel" id="loginCancel">取消</button>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel">
  <div class="panel-header">
    <h1>✦ 星语管理台</h1>
    <div class="header-actions">
      <button class="btn-preview" id="previewBtn">预览展示</button>
      <button class="btn-logout" id="logoutBtn">退出管理</button>
    </div>
  </div>
  <div class="panel-body">
    <!-- Left -->
    <div class="quote-list-pane">
      <div class="pane-title">语句列表</div>
      <div class="quote-list" id="quoteList"></div>
      <div class="add-btn-wrap">
        <button class="btn-add" id="addNewBtn">＋ 新增语句</button>
      </div>
    </div>
    <!-- Right: Editor -->
    <div class="editor-pane" id="editorPane">
      <h2>EDITOR</h2>
      <div class="form-group" style="flex:1;display:flex;flex-direction:column;gap:7px;">
        <label>文字内容</label>
        <textarea id="editText" placeholder="在此输入要展示的语句…" style="flex:1;min-height:120px;"></textarea>
      </div>
      <div class="form-group">
        <label>展示模式</label>
        <div class="mode-grid" id="modeGrid">
          <div class="mode-card active" data-mode="nebula">
            <div class="mc-icon">🌌</div>
            <div class="mc-name">星云</div>
            <div class="mc-desc">柔光发散呼吸</div>
          </div>
          <div class="mode-card" data-mode="rain">
            <div class="mc-icon">🌧</div>
            <div class="mc-name">流落</div>
            <div class="mc-desc">从天而降坠入</div>
          </div>
          <div class="mode-card" data-mode="orbit">
            <div class="mc-icon">🪐</div>
            <div class="mc-name">轨道</div>
            <div class="mc-desc">绕行星系旋转</div>
          </div>
          <div class="mode-card" data-mode="pulse">
            <div class="mc-icon">💗</div>
            <div class="mc-name">心跳</div>
            <div class="mc-desc">脉动缩放呼吸</div>
          </div>
          <div class="mode-card" data-mode="drift">
            <div class="mc-icon">🍃</div>
            <div class="mc-name">飘移</div>
            <div class="mc-desc">随风漫游漂浮</div>
          </div>
          <div class="mode-card" data-mode="aurora">
            <div class="mc-icon">🌈</div>
            <div class="mc-name">极光</div>
            <div class="mc-desc">幻色流光变换</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <div class="multi-toggle">
          <div class="toggle" id="multiToggle"></div>
          <span>多条同时展示（开启后所有语句将同时显示）</span>
        </div>
      </div>
      <div class="editor-actions">
        <button class="btn-save" id="saveBtn">保 存</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD765DnPTLqSMnziFIsyatKqJ9yS_7ayog",
  authDomain: "page-99350.firebaseapp.com",
  projectId: "page-99350",
  storageBucket: "page-99350.firebasestorage.app",
  messagingSenderId: "1017475806028",
  appId: "1:1017475806028:web:5618c25e716b44f694d5e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const COLL = 'starquotes';
const PASSWORD = '1234567890';

// ── STATE ──
let quotes = [];
let isAdmin = false;
let selectedId = null;
let selectedMode = 'nebula';
let multiMode = false;
let editingNew = false;

// ── CANVAS BG ──
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initParticles() {
  particles = [];
  for (let i = 0; i < 200; i++) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.2,
      vx: (Math.random() - .5) * .15,
      vy: (Math.random() - .5) * .15,
      a: Math.random(),
      da: (Math.random() * .005 + .002) * (Math.random() > .5 ? 1 : -1),
      hue: Math.random() > .7 ? 190 : (Math.random() > .5 ? 270 : 340)
    });
  }
}
initParticles();

// nebula blobs
const blobs = Array.from({length:5}, () => ({
  x: Math.random() * W, y: Math.random() * H,
  r: 150 + Math.random()*200,
  vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
  hue: [190,270,340,45,120][Math.floor(Math.random()*5)],
  a: .03 + Math.random()*.04
}));

function drawBg() {
  ctx.fillStyle = '#020408';
  ctx.fillRect(0, 0, W, H);

  blobs.forEach(b => {
    b.x += b.vx; b.y += b.vy;
    if(b.x < -b.r) b.x = W+b.r;
    if(b.x > W+b.r) b.x = -b.r;
    if(b.y < -b.r) b.y = H+b.r;
    if(b.y > H+b.r) b.y = -b.r;
    const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    g.addColorStop(0, `hsla(${b.hue},80%,55%,${b.a})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  });

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.a += p.da;
    if(p.a > 1||p.a < 0) p.da *= -1;
    if(p.x<0) p.x=W; if(p.x>W) p.x=0;
    if(p.y<0) p.y=H; if(p.y>H) p.y=0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${p.hue},80%,80%,${p.a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawBg);
}
drawBg();

// ── FIRESTORE REALTIME ──
const q = query(collection(db, COLL), orderBy('createdAt','asc'));
onSnapshot(q, (snap) => {
  quotes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderDisplay();
  if (isAdmin) renderAdminList();
});

// ── DISPLAY ──
function renderDisplay() {
  const layer = document.getElementById('displayLayer');
  const empty = document.getElementById('emptyState');
  layer.innerHTML = '';
  if (!quotes.length) { empty.style.display='flex'; return; }
  empty.style.display='none';

  const showMulti = quotes.some(q => q.multi);
  if (showMulti) {
    renderMulti(layer);
  } else {
    const q = quotes[quotes.length-1];
    renderSingle(layer, q.text, q.mode || 'nebula');
  }
}

function renderSingle(layer, text, mode) {
  if (mode === 'nebula') {
    const el = document.createElement('div');
    el.className = 'text-nebula';
    el.textContent = text;
    layer.appendChild(el);
  } else if (mode === 'rain') {
    const el = document.createElement('div');
    el.className = 'text-rain';
    el.textContent = text;
    layer.appendChild(el);
  } else if (mode === 'orbit') {
    const wrap = document.createElement('div');
    wrap.className = 'orbit-wrapper';
    const el = document.createElement('div');
    el.className = 'text-orbit';
    el.textContent = text;
    wrap.appendChild(el);
    layer.appendChild(wrap);
  } else if (mode === 'pulse') {
    const el = document.createElement('div');
    el.className = 'text-pulse';
    el.textContent = text;
    layer.appendChild(el);
  } else if (mode === 'drift') {
    const el = document.createElement('div');
    el.className = 'text-drift';
    el.textContent = text;
    el.style.left = (15 + Math.random()*30)+'vw';
    el.style.top = (20 + Math.random()*40)+'vh';
    layer.appendChild(el);
  } else if (mode === 'aurora') {
    const el = document.createElement('div');
    el.className = 'text-aurora';
    el.textContent = text;
    layer.appendChild(el);
  }
}

const multiColors = ['#6ee7f7','#a78fff','#f76f8e','#f7c948','#6effa0','#ff9f7f'];
const multiSizes = ['clamp(14px,2vw,28px)','clamp(16px,2.5vw,34px)','clamp(12px,1.8vw,24px)'];
const multiAnims = ['nebulaPulse','auroraFloat','pulseBreath'];

function renderMulti(layer) {
  const items = quotes.filter(q => q.multi !== false);
  const positions = getScatteredPositions(items.length);
  items.forEach((q, i) => {
    const el = document.createElement('div');
    el.className = 'text-multi-item';
    el.textContent = q.text;
    const color = multiColors[i % multiColors.length];
    el.style.color = color;
    el.style.fontSize = multiSizes[i % multiSizes.length];
    el.style.textShadow = `0 0 30px ${color}88`;
    el.style.left = positions[i].x + '%';
    el.style.top = positions[i].y + '%';
    el.style.transform = 'translate(-50%,-50%)';
    el.style.animation = `nebulaPulse ${3+i*.7}s ease-in-out infinite ${i*.4}s`;
    el.style.opacity = '0.85';
    layer.appendChild(el);
  });
}

function getScatteredPositions(n) {
  const positions = [];
  const cols = Math.ceil(Math.sqrt(n));
  const rows = Math.ceil(n / cols);
  const cw = 90 / cols, rh = 80 / rows;
  let i = 0;
  for (let r = 0; r < rows && i < n; r++) {
    for (let c = 0; c < cols && i < n; c++) {
      positions.push({
        x: 5 + cw * c + cw/2 + (Math.random()-0.5)*8,
        y: 10 + rh * r + rh/2 + (Math.random()-0.5)*6
      });
      i++;
    }
  }
  return positions;
}

// ── ADMIN LIST ──
function renderAdminList() {
  const list = document.getElementById('quoteList');
  list.innerHTML = '';
  if (!quotes.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--sub);font-size:12px;">还没有任何语句</div>';
    return;
  }
  quotes.forEach(q => {
    const div = document.createElement('div');
    div.className = 'quote-item' + (q.id === selectedId ? ' selected' : '');
    const modeMap = { nebula:'星云', rain:'流落', orbit:'轨道', pulse:'心跳', drift:'飘移', aurora:'极光' };
    div.innerHTML = `
      <div class="qi-text">${escHtml(q.text)}</div>
      <div class="qi-meta">
        <span class="mode-badge mode-${q.mode||'nebula'}">${modeMap[q.mode||'nebula']}</span>
        ${q.multi ? '<span style="font-size:10px;color:var(--sub)">多显</span>' : ''}
      </div>
      <div class="qi-actions">
        <button class="btn-icon" onclick="window._edit('${q.id}')">编辑</button>
        <button class="btn-icon del" onclick="window._del('${q.id}')">删除</button>
      </div>`;
    list.appendChild(div);
  });
}

function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── EDIT ──
window._edit = function(id) {
  const q = quotes.find(x => x.id === id);
  if (!q) return;
  selectedId = id;
  editingNew = false;
  document.getElementById('editText').value = q.text;
  selectedMode = q.mode || 'nebula';
  multiMode = !!q.multi;
  updateModeUI();
  updateToggleUI();
  renderAdminList();
};

window._del = async function(id) {
  if (!confirm('确认删除这条语句？')) return;
  await deleteDoc(doc(db, COLL, id));
  if (selectedId === id) { selectedId = null; editingNew = false; clearEditor(); }
  showToast('已删除');
};

function clearEditor() {
  document.getElementById('editText').value = '';
  selectedMode = 'nebula';
  multiMode = false;
  updateModeUI();
  updateToggleUI();
}

// ── ADD NEW ──
document.getElementById('addNewBtn').addEventListener('click', () => {
  selectedId = null;
  editingNew = true;
  clearEditor();
  document.getElementById('editText').focus();
  document.querySelectorAll('.quote-item').forEach(el => el.classList.remove('selected'));
});

// ── SAVE ──
document.getElementById('saveBtn').addEventListener('click', async () => {
  const text = document.getElementById('editText').value.trim();
  if (!text) { showToast('请输入文字内容'); return; }
  const data = { text, mode: selectedMode, multi: multiMode, updatedAt: Date.now() };
  if (selectedId && !editingNew) {
    await updateDoc(doc(db, COLL, selectedId), data);
    showToast('已更新 ✓');
  } else {
    data.createdAt = Date.now();
    const ref = await addDoc(collection(db, COLL), data);
    selectedId = ref.id;
    editingNew = false;
    showToast('已保存 ✓');
  }
});

// ── MODE CARDS ──
document.getElementById('modeGrid').addEventListener('click', (e) => {
  const card = e.target.closest('.mode-card');
  if (!card) return;
  selectedMode = card.dataset.mode;
  updateModeUI();
});
function updateModeUI() {
  document.querySelectorAll('.mode-card').forEach(c => {
    c.classList.toggle('active', c.dataset.mode === selectedMode);
  });
}

// ── MULTI TOGGLE ──
document.getElementById('multiToggle').addEventListener('click', () => {
  multiMode = !multiMode;
  updateToggleUI();
});
function updateToggleUI() {
  document.getElementById('multiToggle').classList.toggle('on', multiMode);
}

// ── LOGIN ──
document.getElementById('gearBtn').addEventListener('click', () => {
  if (isAdmin) { showAdminPanel(); return; }
  document.getElementById('loginOverlay').classList.add('show');
  document.getElementById('pwdInput').focus();
});
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pwdInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('loginCancel').addEventListener('click', () => {
  document.getElementById('loginOverlay').classList.remove('show');
  document.getElementById('loginErr').textContent = '';
  document.getElementById('pwdInput').value = '';
});
function doLogin() {
  const v = document.getElementById('pwdInput').value;
  if (v === PASSWORD) {
    isAdmin = true;
    document.getElementById('loginOverlay').classList.remove('show');
    document.getElementById('pwdInput').value = '';
    showAdminPanel();
  } else {
    document.getElementById('loginErr').textContent = '密码错误，请重试';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

function showAdminPanel() {
  document.getElementById('adminPanel').classList.add('show');
  renderAdminList();
}

// ── LOGOUT ──
document.getElementById('logoutBtn').addEventListener('click', () => {
  isAdmin = false;
  document.getElementById('adminPanel').classList.remove('show');
});

// ── PREVIEW ──
document.getElementById('previewBtn').addEventListener('click', () => {
  document.getElementById('adminPanel').classList.remove('show');
});

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
