<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星语展示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#020408;color:#e8f4f8;font-family:'PingFang SC','Microsoft YaHei',sans-serif;}

#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#displayLayer{position:fixed;inset:0;z-index:10;pointer-events:none;overflow:hidden;}
#emptyHint{position:fixed;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none;}
#emptyHint .icon{font-size:52px;opacity:.25;}
#emptyHint p{font-size:14px;color:#7aa8b8;opacity:.5;letter-spacing:2px;}

/* GEAR */
#gearBtn{
  position:fixed;top:16px;right:18px;z-index:9999;
  width:44px;height:44px;border-radius:50%;
  background:rgba(110,231,247,0.15);
  border:2px solid rgba(110,231,247,0.5);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
#gearBtn:hover{background:rgba(110,231,247,0.3);}
#gearBtn svg{width:20px;height:20px;fill:#6ee7f7;}

/* LOGIN */
#loginBox{
  position:fixed;inset:0;z-index:10000;
  background:rgba(2,4,8,0.9);
  align-items:center;justify-content:center;
  display:none;
}
#loginBox.show{display:flex;}
.lbInner{
  background:#050d1a;border:1px solid rgba(110,231,247,0.3);
  border-radius:16px;padding:36px 40px;width:300px;text-align:center;
}
.lbInner h2{font-size:14px;color:#6ee7f7;letter-spacing:3px;font-weight:400;margin-bottom:24px;}
.lbInner input{
  width:100%;background:rgba(110,231,247,0.05);border:1px solid rgba(110,231,247,0.2);
  border-radius:8px;color:#e8f4f8;font-size:15px;padding:10px 14px;
  outline:none;margin-bottom:14px;
}
.lbErr{font-size:12px;color:#f76f8e;min-height:16px;margin-bottom:10px;}
.btnLogin{
  width:100%;padding:10px;background:linear-gradient(135deg,#1a4a5a,#0d2a3a);
  border:1px solid #6ee7f7;border-radius:8px;color:#6ee7f7;
  font-size:13px;cursor:pointer;letter-spacing:2px;margin-bottom:8px;
}
.btnCancel{background:none;border:none;color:#7aa8b8;font-size:12px;cursor:pointer;}

/* ADMIN PANEL */
#adminPanel{
  position:fixed;inset:0;z-index:9998;
  background:rgba(2,4,8,0.96);
  flex-direction:column;
  display:none;
}
#adminPanel.show{display:flex;}

.ph{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 26px;border-bottom:1px solid rgba(110,231,247,0.18);flex-shrink:0;
}
.ph h1{font-size:14px;color:#6ee7f7;letter-spacing:3px;font-weight:400;}
.ph-acts{display:flex;gap:10px;}
.btnSm{padding:7px 16px;border-radius:7px;font-size:12px;cursor:pointer;background:none;letter-spacing:1px;}
.btnPreview{border:1px solid rgba(110,231,247,0.3);color:#7aa8b8;}
.btnLogout{border:1px solid rgba(247,111,142,.4);color:#f76f8e;}

.pb{display:flex;flex:1;overflow:hidden;}

.listPane{
  width:360px;flex-shrink:0;border-right:1px solid rgba(110,231,247,0.18);
  display:flex;flex-direction:column;overflow:hidden;
}
.paneTitle{padding:14px 18px 8px;font-size:11px;color:#7aa8b8;letter-spacing:2px;flex-shrink:0;}
.qList{flex:1;overflow-y:auto;padding:0 10px 10px;}
.qList::-webkit-scrollbar{width:4px;}
.qList::-webkit-scrollbar-thumb{background:rgba(110,231,247,0.2);border-radius:2px;}
.qItem{
  background:rgba(110,231,247,0.03);border:1px solid rgba(110,231,247,0.15);
  border-radius:10px;padding:11px 13px;margin-bottom:7px;
  display:flex;flex-direction:column;gap:6px;
}
.qItem.sel{border-color:#6ee7f7;background:rgba(110,231,247,0.07);}
.qiText{font-size:13px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.qiMeta{font-size:11px;color:#7aa8b8;display:flex;gap:8px;align-items:center;}
.mBadge{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid;}
.m-nebula{color:#a78fff;border-color:#a78fff44;background:#a78fff11;}
.m-rain{color:#6ee7f7;border-color:#6ee7f744;background:#6ee7f711;}
.m-orbit{color:#f7c948;border-color:#f7c94844;background:#f7c94811;}
.m-pulse{color:#f76f8e;border-color:#f76f8e44;background:#f76f8e11;}
.m-drift{color:#6effa0;border-color:#6effa044;background:#6effa011;}
.m-aurora{color:#ff9f7f;border-color:#ff9f7f44;background:#ff9f7f11;}
.qiActs{display:flex;gap:6px;}
.btnIcon{background:none;border:1px solid rgba(110,231,247,0.2);border-radius:6px;color:#7aa8b8;padding:3px 9px;font-size:11px;cursor:pointer;}
.btnIcon:hover{border-color:#6ee7f7;color:#6ee7f7;}
.btnIcon.del:hover{border-color:#f76f8e;color:#f76f8e;}
.addWrap{padding:10px;flex-shrink:0;}
.btnAdd{width:100%;padding:9px;background:rgba(110,231,247,0.04);border:1px dashed rgba(110,231,247,0.25);border-radius:8px;color:#7aa8b8;font-size:13px;cursor:pointer;}
.btnAdd:hover{border-color:#6ee7f7;color:#6ee7f7;}

.edPane{flex:1;display:flex;flex-direction:column;padding:20px 26px;gap:16px;overflow-y:auto;}
.edLabel{font-size:11px;color:#7aa8b8;letter-spacing:1px;margin-bottom:6px;}
textarea#editText{
  width:100%;min-height:110px;background:rgba(110,231,247,0.04);
  border:1px solid rgba(110,231,247,0.18);border-radius:8px;color:#e8f4f8;
  font-size:15px;padding:11px 13px;font-family:Georgia,serif;
  line-height:1.8;outline:none;resize:vertical;
}
textarea#editText:focus{border-color:#6ee7f7;}
.modeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mCard{border:1px solid rgba(110,231,247,0.18);border-radius:8px;padding:10px 12px;cursor:pointer;}
.mCard.act{border-color:#6ee7f7;background:rgba(110,231,247,0.08);}
.mCard .mi{font-size:20px;}
.mCard .mn{font-size:12px;color:#e8f4f8;margin-top:3px;}
.mCard .md{font-size:10px;color:#7aa8b8;}
.toggleRow{display:flex;align-items:center;gap:10px;font-size:13px;color:#7aa8b8;}
.tog{width:36px;height:20px;background:rgba(110,231,247,0.1);border:1px solid rgba(110,231,247,0.2);border-radius:10px;cursor:pointer;position:relative;flex-shrink:0;}
.tog.on{background:rgba(110,231,247,0.28);border-color:#6ee7f7;}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#7aa8b8;transition:.2s;}
.tog.on::after{left:18px;background:#6ee7f7;}
.edActs{display:flex;gap:10px;}
.btnSave{padding:9px 26px;background:linear-gradient(135deg,#1a4a5a,#0d2a3a);border:1px solid #6ee7f7;border-radius:8px;color:#6ee7f7;font-size:13px;cursor:pointer;letter-spacing:2px;}

/* TEXT DISPLAY */
.t-nebula{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:Georgia,serif;font-size:clamp(22px,4vw,56px);color:#fff;text-align:center;max-width:80vw;line-height:1.7;text-shadow:0 0 40px rgba(110,231,247,.6),0 0 80px rgba(110,231,247,.3);animation:nebPulse 4s ease-in-out infinite;}
@keyframes nebPulse{0%,100%{opacity:.85;}50%{opacity:1;text-shadow:0 0 70px rgba(110,231,247,1),0 0 130px rgba(167,143,255,.6);}}
.t-rain{position:absolute;left:50%;transform:translateX(-50%);font-family:Georgia,serif;font-size:clamp(20px,3.5vw,48px);color:#6ee7f7;text-align:center;max-width:80vw;line-height:1.8;animation:rainFall 7s ease-in-out infinite;}
@keyframes rainFall{0%{top:-20%;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{top:110%;opacity:0;}}
.orbit-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;animation:orbitR 22s linear infinite;}
.t-orbit{font-family:Georgia,serif;font-size:clamp(16px,2.5vw,36px);color:#f7c948;text-align:center;max-width:70vw;line-height:1.8;transform:translateY(-28vh);animation:orbitC 22s linear infinite;}
@keyframes orbitR{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes orbitC{from{transform:translateY(-28vh) rotate(0)}to{transform:translateY(-28vh) rotate(-360deg)}}
.t-pulse{position:absolute;top:50%;left:50%;font-family:Georgia,serif;font-size:clamp(24px,4.5vw,64px);color:#f76f8e;text-align:center;max-width:80vw;line-height:1.7;animation:pulsB 3s ease-in-out infinite;}
@keyframes pulsB{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8;}50%{transform:translate(-50%,-50%) scale(1.08);opacity:1;}}
.t-drift{position:absolute;font-family:Georgia,serif;font-size:clamp(18px,3vw,44px);color:#6effa0;text-align:center;max-width:75vw;line-height:1.8;animation:driftF 18s ease-in-out infinite;}
@keyframes driftF{0%{transform:translate(0,0) rotate(-1deg);opacity:.7;}25%{transform:translate(3vw,-4vh) rotate(1deg);opacity:1;}50%{transform:translate(-2vw,3vh) rotate(-.5deg);opacity:.85;}75%{transform:translate(4vw,2vh) rotate(1.5deg);opacity:1;}100%{transform:translate(0,0) rotate(-1deg);opacity:.7;}}
.t-aurora{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:Georgia,serif;font-size:clamp(22px,3.8vw,52px);text-align:center;max-width:80vw;line-height:1.7;animation:aurColor 6s ease-in-out infinite,aurFloat 8s ease-in-out infinite;filter:drop-shadow(0 0 20px currentColor);}
@keyframes aurColor{0%{color:#6ee7f7;}16%{color:#a78fff;}33%{color:#f76f8e;}50%{color:#f7c948;}66%{color:#6effa0;}83%{color:#ff9f7f;}100%{color:#6ee7f7;}}
@keyframes aurFloat{0%,100%{transform:translate(-50%,-50%) translateY(0);}50%{transform:translate(-50%,-50%) translateY(-22px);}}
.t-multi{position:absolute;font-family:Georgia,serif;text-align:center;max-width:55vw;line-height:1.7;animation:nebPulse 4s ease-in-out infinite;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(4,12,22,0.92);border:1px solid #6ee7f7;border-radius:8px;padding:9px 20px;font-size:13px;color:#6ee7f7;z-index:99999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="emptyHint">
  <div class="icon">✦</div>
  <p>暂无内容 · 请管理员添加语句</p>
</div>

<div id="displayLayer"></div>

<!-- 齿轮按钮 - 纯HTML onclick，不依赖模块 -->
<button id="gearBtn" onclick="onGearClick()" title="管理员入口">
  <svg viewBox="0 0 24 24"><path d="M19.14,12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24,0-.43.17-.47.41l-.36,2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47,0-.59.22L2.74,8.87c-.12.22-.07.47.12.61l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s.02.64.07.94l-2.03,1.58c-.18.14-.23.41-.12.61l1.92,3.32c.12.22.37.29.59.22l2.39-.96c.5.38,1.03.7,1.62.94l.36,2.54c.05.24.24.41.48.41h3.84c.24,0,.44-.17.47-.41l.36-2.54c.59-.24,1.13-.56,1.62-.94l2.39.96c.22.08.47,0,.59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58ZM12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6,3.6,1.62,3.6,3.6-1.62,3.6-3.6,3.6Z"/></svg>
</button>

<!-- LOGIN -->
<div id="loginBox">
  <div class="lbInner">
    <h2>管 理 员 登 录</h2>
    <input type="password" id="pwdInput" placeholder="请输入管理密码" />
    <div class="lbErr" id="lbErr"></div>
    <button class="btnLogin" onclick="tryLogin()">进 入</button>
    <br>
    <button class="btnCancel" onclick="closeLogin()">取消</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="ph">
    <h1>✦ 星语管理台</h1>
    <div class="ph-acts">
      <button class="btnSm btnPreview" onclick="closePanel()">预览展示</button>
      <button class="btnSm btnLogout" onclick="doLogout()">退出管理</button>
    </div>
  </div>
  <div class="pb">
    <div class="listPane">
      <div class="paneTitle">语句列表</div>
      <div class="qList" id="qList"></div>
      <div class="addWrap">
        <button class="btnAdd" onclick="startNew()">＋ 新增语句</button>
      </div>
    </div>
    <div class="edPane">
      <div>
        <div class="edLabel">文字内容</div>
        <textarea id="editText" placeholder="在此输入要展示的语句…"></textarea>
      </div>
      <div>
        <div class="edLabel">展示模式</div>
        <div class="modeGrid" id="modeGrid">
          <div class="mCard act" data-mode="nebula" onclick="pickMode(this)"><div class="mi">🌌</div><div class="mn">星云</div><div class="md">柔光呼吸发散</div></div>
          <div class="mCard" data-mode="rain" onclick="pickMode(this)"><div class="mi">🌧</div><div class="mn">流落</div><div class="md">从天而降坠入</div></div>
          <div class="mCard" data-mode="orbit" onclick="pickMode(this)"><div class="mi">🪐</div><div class="mn">轨道</div><div class="md">绕星系旋转</div></div>
          <div class="mCard" data-mode="pulse" onclick="pickMode(this)"><div class="mi">💗</div><div class="mn">心跳</div><div class="md">脉动缩放呼吸</div></div>
          <div class="mCard" data-mode="drift" onclick="pickMode(this)"><div class="mi">🍃</div><div class="mn">飘移</div><div class="md">随风漫游漂浮</div></div>
          <div class="mCard" data-mode="aurora" onclick="pickMode(this)"><div class="mi">🌈</div><div class="mn">极光</div><div class="md">幻色流光变换</div></div>
        </div>
      </div>
      <div>
        <div class="edLabel">多条同时展示</div>
        <div class="toggleRow">
          <div class="tog" id="togMulti" onclick="toggleMulti()"></div>
          <span>开启后所有语句同时显示</span>
        </div>
      </div>
      <div class="edActs">
        <button class="btnSave" onclick="doSave()">保 存</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 普通script（非module），先跑UI逻辑 -->
<script>
var isAdmin = false;
var selId = null;
var isNew = false;
var curMode = 'nebula';
var multiOn = false;
var quotes = [];

function onGearClick(){
  if(isAdmin){ showPanel(); return; }
  document.getElementById('loginBox').style.display = 'flex';
  setTimeout(function(){ document.getElementById('pwdInput').focus(); }, 50);
}

function closeLogin(){
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('pwdInput').value = '';
  document.getElementById('lbErr').textContent = '';
}

function tryLogin(){
  var v = document.getElementById('pwdInput').value;
  if(v === '1234567890'){
    isAdmin = true;
    closeLogin();
    showPanel();
  } else {
    document.getElementById('lbErr').textContent = '密码错误，请重试';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

document.getElementById('pwdInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') tryLogin();
});

function showPanel(){
  document.getElementById('adminPanel').style.display = 'flex';
  renderList();
}

function closePanel(){
  document.getElementById('adminPanel').style.display = 'none';
}

function doLogout(){
  isAdmin = false;
  closePanel();
}

function startNew(){
  selId = null; isNew = true;
  document.getElementById('editText').value = '';
  curMode = 'nebula'; multiOn = false;
  syncModeUI(); syncToggle();
  document.getElementById('editText').focus();
  document.querySelectorAll('.qItem').forEach(function(el){ el.classList.remove('sel'); });
}

function pickMode(el){
  curMode = el.dataset.mode;
  syncModeUI();
}

function syncModeUI(){
  document.querySelectorAll('.mCard').forEach(function(c){
    c.classList.toggle('act', c.dataset.mode === curMode);
  });
}

function toggleMulti(){
  multiOn = !multiOn;
  syncToggle();
}

function syncToggle(){
  document.getElementById('togMulti').classList.toggle('on', multiOn);
}

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderList(){
  var list = document.getElementById('qList');
  list.innerHTML = '';
  if(!quotes.length){
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#7aa8b8;font-size:12px;">还没有语句，点击下方新增</div>';
    return;
  }
  var mn = {nebula:'星云',rain:'流落',orbit:'轨道',pulse:'心跳',drift:'飘移',aurora:'极光'};
  quotes.forEach(function(q){
    var d = document.createElement('div');
    d.className = 'qItem' + (q.id === selId ? ' sel' : '');
    d.innerHTML =
      '<div class="qiText">' + esc(q.text) + '</div>' +
      '<div class="qiMeta"><span class="mBadge m-'+(q.mode||'nebula')+'">'+(mn[q.mode||'nebula']||'星云')+'</span>'+(q.multi?'<span style="font-size:10px">多显</span>':'')+'</div>' +
      '<div class="qiActs"><button class="btnIcon" onclick="doEdit(\''+q.id+'\')">编辑</button><button class="btnIcon del" onclick="doDel(\''+q.id+'\')">删除</button></div>';
    list.appendChild(d);
  });
}

function doEdit(id){
  var q = quotes.find(function(x){ return x.id === id; });
  if(!q) return;
  selId = id; isNew = false;
  document.getElementById('editText').value = q.text;
  curMode = q.mode || 'nebula';
  multiOn = !!q.multi;
  syncModeUI(); syncToggle(); renderList();
}

function doDel(id){
  if(!confirm('确认删除这条语句？')) return;
  if(window._fbDel) window._fbDel(id);
}

function doSave(){
  var text = document.getElementById('editText').value.trim();
  if(!text){ showToast('请输入文字内容'); return; }
  var data = { text: text, mode: curMode, multi: multiOn, updatedAt: Date.now() };
  if(selId && !isNew){
    if(window._fbUpdate) window._fbUpdate(selId, data);
  } else {
    data.createdAt = Date.now();
    if(window._fbAdd) window._fbAdd(data);
  }
}

function renderDisplay(){
  var layer = document.getElementById('displayLayer');
  var hint = document.getElementById('emptyHint');
  layer.innerHTML = '';
  if(!quotes.length){ hint.style.display = 'flex'; return; }
  hint.style.display = 'none';
  var doMulti = quotes.some(function(q){ return q.multi; });
  if(doMulti){ renderMulti(layer); }
  else {
    var q = quotes[quotes.length-1];
    renderOne(layer, q.text, q.mode || 'nebula');
  }
}

function mk(tag, cls){ var el = document.createElement(tag); el.className = cls; return el; }

function renderOne(layer, text, mode){
  if(mode === 'nebula'){
    var el = mk('div','t-nebula'); el.textContent = text; layer.appendChild(el);
  } else if(mode === 'rain'){
    var el = mk('div','t-rain'); el.textContent = text; layer.appendChild(el);
  } else if(mode === 'orbit'){
    var w = mk('div','orbit-wrap'); var el = mk('div','t-orbit');
    el.textContent = text; w.appendChild(el); layer.appendChild(w);
  } else if(mode === 'pulse'){
    var el = mk('div','t-pulse'); el.textContent = text; layer.appendChild(el);
  } else if(mode === 'drift'){
    var el = mk('div','t-drift'); el.textContent = text;
    el.style.left = (12+Math.random()*30)+'vw';
    el.style.top = (18+Math.random()*40)+'vh';
    layer.appendChild(el);
  } else if(mode === 'aurora'){
    var el = mk('div','t-aurora'); el.textContent = text; layer.appendChild(el);
  }
}

var MC = ['#6ee7f7','#a78fff','#f76f8e','#f7c948','#6effa0','#ff9f7f'];
var MS = ['clamp(14px,2vw,28px)','clamp(17px,2.6vw,36px)','clamp(12px,1.8vw,24px)'];

function renderMulti(layer){
  var n = quotes.length;
  var cols = Math.ceil(Math.sqrt(n));
  var rows = Math.ceil(n/cols);
  var cw = 88/cols, rh = 78/rows;
  var i = 0;
  for(var r=0;r<rows&&i<n;r++){
    for(var c=0;c<cols&&i<n;c++){
      var q = quotes[i];
      var el = mk('div','t-multi');
      el.textContent = q.text;
      var col = MC[i % MC.length];
      el.style.color = col;
      el.style.fontSize = MS[i % MS.length];
      el.style.textShadow = '0 0 30px '+col+'88';
      el.style.left = (6+cw*c+cw/2+(Math.random()-.5)*6)+'vw';
      el.style.top = (10+rh*r+rh/2+(Math.random()-.5)*5)+'vh';
      el.style.transform = 'translate(-50%,-50%)';
      el.style.animationDelay = (i*.35)+'s';
      el.style.animationDuration = (3.5+i*.5)+'s';
      layer.appendChild(el);
      i++;
    }
  }
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// Canvas BG
var cvs = document.getElementById('bgCanvas');
var ctx = cvs.getContext('2d');
var W, H;
function resize(){ W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
resize(); addEventListener('resize', resize);
var blobs = [];
for(var i=0;i<5;i++) blobs.push({x:Math.random()*1200,y:Math.random()*800,r:160+Math.random()*220,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,hue:[190,270,340,45,120][Math.floor(Math.random()*5)],a:.025+Math.random()*.04});
var pts = [];
for(var i=0;i<180;i++) pts.push({x:Math.random()*1400,y:Math.random()*900,r:Math.random()*1.4+.2,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,a:Math.random(),da:(.003+Math.random()*.005)*(Math.random()>.5?1:-1),h:Math.random()>.7?190:(Math.random()>.5?270:340)});
(function draw(){
  ctx.fillStyle='#020408'; ctx.fillRect(0,0,W,H);
  blobs.forEach(function(b){
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<-b.r)b.x=W+b.r; if(b.x>W+b.r)b.x=-b.r;
    if(b.y<-b.r)b.y=H+b.r; if(b.y>H+b.r)b.y=-b.r;
    var g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    g.addColorStop(0,'hsla('+b.hue+',75%,55%,'+b.a+')');
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });
  pts.forEach(function(p){
    p.x+=p.vx; p.y+=p.vy; p.a+=p.da;
    if(p.a>1||p.a<0)p.da*=-1;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='hsla('+p.h+',80%,80%,'+p.a+')'; ctx.fill();
  });
  requestAnimationFrame(draw);
})();
</script>

window._fbUpdate = async function(id, data){

};

};
