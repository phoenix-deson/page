<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星语展示</title>
<style>
:root {
  --bg: #020408;
  --accent: #6ee7f7;
  --gold: #f7c948;
  --rose: #f76f8e;
  --green: #6effa0;
  --purple: #a78fff;
  --panel: rgba(4,12,22,0.97);
  --text: #e8f4f8;
  --sub: #7aa8b8;
  --border: rgba(110,231,247,0.18);
  --font-d: 'Georgia','STSong',serif;
  --font-ui: 'PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);}

#bgCanvas{position:fixed;inset:0;z-index:0;}

/* GEAR */
#gearBtn{
  position:fixed;top:16px;right:18px;z-index:500;
  width:40px;height:40px;border-radius:50%;
  background:rgba(4,12,22,0.7);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:.3s;
}
#gearBtn:hover{border-color:var(--accent);background:rgba(110,231,247,0.1);}
#gearBtn svg{width:18px;height:18px;fill:var(--sub);transition:.4s;}
#gearBtn:hover svg{fill:var(--accent);transform:rotate(60deg);}

/* DISPLAY */
#displayLayer{position:fixed;inset:0;z-index:10;pointer-events:none;overflow:hidden;}

/* EMPTY */
#emptyHint{
  position:fixed;inset:0;z-index:9;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;pointer-events:none;
}
#emptyHint .icon{font-size:52px;opacity:.25;}
#emptyHint p{font-size:14px;color:var(--sub);opacity:.5;letter-spacing:2px;}

/* LOGIN */
#loginBox{
  position:fixed;inset:0;z-index:600;
  background:rgba(2,4,8,0.88);backdrop-filter:blur(18px);
  display:none;align-items:center;justify-content:center;
}
#loginBox.show{display:flex;}
.lbInner{
  background:var(--panel);border:1px solid var(--border);
  border-radius:16px;padding:36px 40px;width:300px;text-align:center;
}
.lbInner h2{font-size:14px;color:var(--accent);letter-spacing:3px;font-weight:400;margin-bottom:24px;}
.lbInner input{
  width:100%;background:rgba(110,231,247,0.05);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:15px;padding:10px 14px;
  font-family:var(--font-ui);outline:none;transition:.2s;margin-bottom:14px;
}
.lbInner input:focus{border-color:var(--accent);}
.lbErr{font-size:12px;color:var(--rose);min-height:16px;margin-bottom:10px;}
.btnP{
  width:100%;padding:10px;background:linear-gradient(135deg,#1a4a5a,#0d2a3a);
  border:1px solid var(--accent);border-radius:8px;color:var(--accent);
  font-size:13px;cursor:pointer;letter-spacing:2px;transition:.2s;
}
.btnP:hover{box-shadow:0 0 18px rgba(110,231,247,.25);}
.btnC{margin-top:10px;background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;}
.btnC:hover{color:var(--text);}

/* ADMIN PANEL */
#adminPanel{
  position:fixed;inset:0;z-index:550;
  background:rgba(2,4,8,0.94);backdrop-filter:blur(20px);
  display:none;flex-direction:column;
}
#adminPanel.show{display:flex;}
.ph{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 26px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.ph h1{font-size:14px;color:var(--accent);letter-spacing:3px;font-weight:400;}
.ph-acts{display:flex;gap:10px;}
.btnSm{
  padding:7px 16px;border-radius:7px;font-size:12px;cursor:pointer;
  background:none;transition:.2s;letter-spacing:1px;
}
.btnPreview{border:1px solid var(--border);color:var(--sub);}
.btnPreview:hover{border-color:var(--gold);color:var(--gold);}
.btnLogout{border:1px solid rgba(247,111,142,.3);color:rgba(247,111,142,.7);}
.btnLogout:hover{border-color:var(--rose);color:var(--rose);}

.pb{display:flex;flex:1;overflow:hidden;}

/* LEFT LIST */
.listPane{
  width:360px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.paneTitle{padding:14px 18px 8px;font-size:11px;color:var(--sub);letter-spacing:2px;flex-shrink:0;}
.qList{flex:1;overflow-y:auto;padding:0 10px 10px;}
.qList::-webkit-scrollbar{width:4px;}
.qList::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.qItem{
  background:rgba(110,231,247,0.03);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;
  transition:.2s;display:flex;flex-direction:column;gap:6px;
}
.qItem:hover,.qItem.sel{border-color:var(--accent);background:rgba(110,231,247,0.07);}
.qiText{font-size:13px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.qiMeta{font-size:11px;color:var(--sub);display:flex;gap:8px;align-items:center;}
.mBadge{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid;}
.m-nebula{color:#a78fff;border-color:#a78fff44;background:#a78fff11;}
.m-rain{color:#6ee7f7;border-color:#6ee7f744;background:#6ee7f711;}
.m-orbit{color:#f7c948;border-color:#f7c94844;background:#f7c94811;}
.m-pulse{color:#f76f8e;border-color:#f76f8e44;background:#f76f8e11;}
.m-drift{color:#6effa0;border-color:#6effa044;background:#6effa011;}
.m-aurora{color:#ff9f7f;border-color:#ff9f7f44;background:#ff9f7f11;}
.qiActs{display:flex;gap:6px;}
.btnIcon{
  background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--sub);padding:3px 9px;font-size:11px;cursor:pointer;transition:.2s;
}
.btnIcon:hover{border-color:var(--accent);color:var(--accent);}
.btnIcon.del:hover{border-color:var(--rose);color:var(--rose);}
.addWrap{padding:10px;flex-shrink:0;}
.btnAdd{
  width:100%;padding:9px;background:rgba(110,231,247,0.04);
  border:1px dashed var(--border);border-radius:8px;
  color:var(--sub);font-size:13px;cursor:pointer;transition:.2s;
}
.btnAdd:hover{border-color:var(--accent);color:var(--accent);background:rgba(110,231,247,0.09);}

/* RIGHT EDITOR */
.edPane{
  flex:1;display:flex;flex-direction:column;padding:20px 26px;
  gap:16px;overflow-y:auto;
}
.edLabel{font-size:11px;color:var(--sub);letter-spacing:1px;margin-bottom:6px;}
textarea#editText{
  width:100%;min-height:110px;background:rgba(110,231,247,0.04);
  border:1px solid var(--border);border-radius:8px;color:var(--text);
  font-size:15px;padding:11px 13px;font-family:var(--font-d);
  line-height:1.8;outline:none;resize:vertical;transition:.2s;
}
textarea#editText:focus{border-color:var(--accent);}
.modeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mCard{
  border:1px solid var(--border);border-radius:8px;padding:10px 12px;
  cursor:pointer;transition:.2s;
}
.mCard:hover,.mCard.act{border-color:var(--accent);background:rgba(110,231,247,0.08);}
.mCard .mi{font-size:20px;}
.mCard .mn{font-size:12px;color:var(--text);margin-top:3px;}
.mCard .md{font-size:10px;color:var(--sub);}
.toggleRow{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--sub);}
.tog{
  width:36px;height:20px;background:rgba(110,231,247,0.1);
  border:1px solid var(--border);border-radius:10px;cursor:pointer;
  position:relative;transition:.2s;flex-shrink:0;
}
.tog.on{background:rgba(110,231,247,0.28);border-color:var(--accent);}
.tog::after{
  content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;
  border-radius:50%;background:var(--sub);transition:.2s;
}
.tog.on::after{left:18px;background:var(--accent);}
.edActs{display:flex;gap:10px;flex-shrink:0;}
.btnSave{
  padding:9px 26px;background:linear-gradient(135deg,#1a4a5a,#0d2a3a);
  border:1px solid var(--accent);border-radius:8px;color:var(--accent);
  font-size:13px;cursor:pointer;letter-spacing:2px;transition:.2s;
}
.btnSave:hover{box-shadow:0 0 18px rgba(110,231,247,.25);}

/* TEXT DISPLAY ANIMATIONS */
.t-nebula{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--font-d);font-size:clamp(22px,4vw,56px);
  color:#fff;text-align:center;max-width:80vw;line-height:1.7;
  text-shadow:0 0 40px rgba(110,231,247,.6),0 0 80px rgba(110,231,247,.3),0 0 120px rgba(167,143,255,.3);
  animation:nebPulse 4s ease-in-out infinite;
}
@keyframes nebPulse{
  0%,100%{opacity:.85;text-shadow:0 0 40px rgba(110,231,247,.6),0 0 80px rgba(110,231,247,.3);}
  50%{opacity:1;text-shadow:0 0 70px rgba(110,231,247,1),0 0 130px rgba(167,143,255,.6);}
}
.t-rain{
  position:absolute;left:50%;transform:translateX(-50%);
  font-family:var(--font-d);font-size:clamp(20px,3.5vw,48px);
  color:var(--accent);text-align:center;max-width:80vw;line-height:1.8;
  text-shadow:0 0 20px rgba(110,231,247,.5);
  animation:rainFall 7s ease-in-out infinite;
}
@keyframes rainFall{
  0%{top:-20%;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{top:110%;opacity:0;}
}
.orbit-wrap{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  animation:orbitR 22s linear infinite;
}
.t-orbit{
  font-family:var(--font-d);font-size:clamp(16px,2.5vw,36px);
  color:var(--gold);text-align:center;max-width:70vw;line-height:1.8;
  text-shadow:0 0 30px rgba(247,201,72,.5);
  transform:translateY(-28vh);
  animation:orbitC 22s linear infinite;
}
@keyframes orbitR{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes orbitC{from{transform:translateY(-28vh) rotate(0)}to{transform:translateY(-28vh) rotate(-360deg)}}
.t-pulse{
  position:absolute;top:50%;left:50%;
  font-family:var(--font-d);font-size:clamp(24px,4.5vw,64px);
  color:var(--rose);text-align:center;max-width:80vw;line-height:1.7;
  text-shadow:0 0 40px rgba(247,111,142,.6);
  animation:pulsB 3s ease-in-out infinite;
}
@keyframes pulsB{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8;}
  50%{transform:translate(-50%,-50%) scale(1.08);opacity:1;}
}
.t-drift{
  position:absolute;font-family:var(--font-d);font-size:clamp(18px,3vw,44px);
  color:var(--green);text-align:center;max-width:75vw;line-height:1.8;
  text-shadow:0 0 30px rgba(110,255,160,.5);
  animation:driftF 18s ease-in-out infinite;
}
@keyframes driftF{
  0%{transform:translate(0,0) rotate(-1deg);opacity:.7;}
  25%{transform:translate(3vw,-4vh) rotate(1deg);opacity:1;}
  50%{transform:translate(-2vw,3vh) rotate(-.5deg);opacity:.85;}
  75%{transform:translate(4vw,2vh) rotate(1.5deg);opacity:1;}
  100%{transform:translate(0,0) rotate(-1deg);opacity:.7;}
}
.t-aurora{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--font-d);font-size:clamp(22px,3.8vw,52px);
  text-align:center;max-width:80vw;line-height:1.7;
  animation:aurColor 6s ease-in-out infinite,aurFloat 8s ease-in-out infinite;
  filter:drop-shadow(0 0 20px currentColor);
}
@keyframes aurColor{
  0%{color:#6ee7f7;}16%{color:#a78fff;}33%{color:#f76f8e;}
  50%{color:#f7c948;}66%{color:#6effa0;}83%{color:#ff9f7f;}100%{color:#6ee7f7;}
}
@keyframes aurFloat{
  0%,100%{transform:translate(-50%,-50%) translateY(0);}
  50%{transform:translate(-50%,-50%) translateY(-22px);}
}
.t-multi{
  position:absolute;font-family:var(--font-d);text-align:center;
  max-width:55vw;line-height:1.7;
  animation:nebPulse 4s ease-in-out infinite;
}

/* TOAST */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(4,12,22,0.92);border:1px solid var(--accent);
  border-radius:8px;padding:9px 20px;font-size:13px;color:var(--accent);
  z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="emptyHint">
  <div class="icon">✦</div>
  <p>暂无内容 · 请管理员添加语句</p>
</div>

<div id="displayLayer"></div>

<button id="gearBtn" title="管理员入口">
  <svg viewBox="0 0 24 24"><path d="M19.14,12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24,0-.43.17-.47.41l-.36,2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47,0-.59.22L2.74,8.87c-.12.22-.07.47.12.61l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s.02.64.07.94l-2.03,1.58c-.18.14-.23.41-.12.61l1.92,3.32c.12.22.37.29.59.22l2.39-.96c.5.38,1.03.7,1.62.94l.36,2.54c.05.24.24.41.48.41h3.84c.24,0,.44-.17.47-.41l.36-2.54c.59-.24,1.13-.56,1.62-.94l2.39.96c.22.08.47,0,.59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58ZM12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6,3.6,1.62,3.6,3.6-1.62,3.6-3.6,3.6Z"/></svg>
</button>

<!-- LOGIN -->
<div id="loginBox">
  <div class="lbInner">
    <h2>管 理 员 登 录</h2>
    <input type="password" id="pwdInput" placeholder="请输入管理密码" />
    <div class="lbErr" id="lbErr"></div>
    <button class="btnP" id="loginBtn">进 入</button>
    <button class="btnC" id="loginCancel">取消</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="ph">
    <h1>✦ 星语管理台</h1>
    <div class="ph-acts">
      <button class="btnSm btnPreview" id="btnPreview">预览展示</button>
      <button class="btnSm btnLogout" id="btnLogout">退出管理</button>
    </div>
  </div>
  <div class="pb">
    <div class="listPane">
      <div class="paneTitle">语句列表</div>
      <div class="qList" id="qList"></div>
      <div class="addWrap">
        <button class="btnAdd" id="btnAddNew">＋ 新增语句</button>
      </div>
    </div>
    <div class="edPane">
      <div>
        <div class="edLabel">文字内容</div>
        <textarea id="editText" placeholder="在此输入要展示的语句…"></textarea>
      </div>
      <div>
        <div class="edLabel">展示模式</div>
        <div class="modeGrid" id="modeGrid">
          <div class="mCard act" data-mode="nebula"><div class="mi">🌌</div><div class="mn">星云</div><div class="md">柔光呼吸发散</div></div>
          <div class="mCard" data-mode="rain"><div class="mi">🌧</div><div class="mn">流落</div><div class="md">从天而降坠入</div></div>
          <div class="mCard" data-mode="orbit"><div class="mi">🪐</div><div class="mn">轨道</div><div class="md">绕星系旋转</div></div>
          <div class="mCard" data-mode="pulse"><div class="mi">💗</div><div class="mn">心跳</div><div class="md">脉动缩放呼吸</div></div>
          <div class="mCard" data-mode="drift"><div class="mi">🍃</div><div class="mn">飘移</div><div class="md">随风漫游漂浮</div></div>
          <div class="mCard" data-mode="aurora"><div class="mi">🌈</div><div class="mn">极光</div><div class="md">幻色流光变换</div></div>
        </div>
      </div>
      <div>
        <div class="edLabel">多条同时展示</div>
        <div class="toggleRow">
          <div class="tog" id="togMulti"></div>
          <span>开启后所有语句将同时显示在全屏</span>
        </div>
      </div>
      <div class="edActs">
        <button class="btnSave" id="btnSave">保 存</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.15.0/firestore.js";

// ── Firebase ──
const app = initializeApp({
  apiKey: "AIzaSyD765DnPTLqSMnziFIsyatKqJ9yS_7ayog",
  authDomain: "page-99350.firebaseapp.com",
  projectId: "page-99350",
  storageBucket: "page-99350.firebasestorage.app",
  messagingSenderId: "1017475806028",
  appId: "1:1017475806028:web:5618c25e716b44f694d5e9"
});
const db = getFirestore(app);
const COLL = 'starquotes';
const PWD = '1234567890';

// ── State ──
let quotes = [];
let isAdmin = false;
let selId = null;
let isNew = false;
let curMode = 'nebula';
let multiOn = false;

// ── Canvas BG ──
const cvs = document.getElementById('bgCanvas');
const ctx = cvs.getContext('2d');
let W, H;
function resize(){ W = cvs.width = innerWidth; H = cvs.height = innerHeight; }
resize(); addEventListener('resize', resize);

const blobs = Array.from({length:5},()=>({
  x:Math.random()*1200, y:Math.random()*800,
  r:160+Math.random()*220,
  vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
  hue:[190,270,340,45,120][Math.floor(Math.random()*5)],
  a:.025+Math.random()*.04
}));
const pts = Array.from({length:180},()=>({
  x:Math.random()*1400, y:Math.random()*900,
  r:Math.random()*1.4+.2,
  vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.18,
  a:Math.random(), da:(.003+Math.random()*.005)*(Math.random()>.5?1:-1),
  h:Math.random()>.7?190:(Math.random()>.5?270:340)
}));
(function draw(){
  ctx.fillStyle='#020408'; ctx.fillRect(0,0,W,H);
  blobs.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<-b.r)b.x=W+b.r; if(b.x>W+b.r)b.x=-b.r;
    if(b.y<-b.r)b.y=H+b.r; if(b.y>H+b.r)b.y=-b.r;
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    g.addColorStop(0,`hsla(${b.hue},75%,55%,${b.a})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.a+=p.da;
    if(p.a>1||p.a<0)p.da*=-1;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.h},80%,80%,${p.a})`; ctx.fill();
  });
  requestAnimationFrame(draw);
})();

// ── Firestore realtime ──
onSnapshot(query(collection(db,COLL),orderBy('createdAt','asc')), snap=>{
  quotes = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderDisplay();
  if(isAdmin) renderList();
});

// ── DISPLAY ──
function renderDisplay(){
  const layer = document.getElementById('displayLayer');
  const hint = document.getElementById('emptyHint');
  layer.innerHTML = '';
  if(!quotes.length){ hint.style.display='flex'; return; }
  hint.style.display='none';
  const doMulti = quotes.some(q=>q.multi);
  if(doMulti){ renderMulti(layer); }
  else { const q=quotes[quotes.length-1]; renderOne(layer, q.text, q.mode||'nebula'); }
}

function renderOne(layer, text, mode){
  if(mode==='nebula'){
    const el=mk('div','t-nebula'); el.textContent=text; layer.appendChild(el);
  } else if(mode==='rain'){
    const el=mk('div','t-rain'); el.textContent=text; layer.appendChild(el);
  } else if(mode==='orbit'){
    const w=mk('div','orbit-wrap'); const el=mk('div','t-orbit');
    el.textContent=text; w.appendChild(el); layer.appendChild(w);
  } else if(mode==='pulse'){
    const el=mk('div','t-pulse'); el.textContent=text; layer.appendChild(el);
  } else if(mode==='drift'){
    const el=mk('div','t-drift'); el.textContent=text;
    el.style.left=(12+Math.random()*30)+'vw'; el.style.top=(18+Math.random()*40)+'vh';
    layer.appendChild(el);
  } else if(mode==='aurora'){
    const el=mk('div','t-aurora'); el.textContent=text; layer.appendChild(el);
  }
}

const MC=['#6ee7f7','#a78fff','#f76f8e','#f7c948','#6effa0','#ff9f7f'];
const MS=['clamp(14px,2vw,28px)','clamp(17px,2.6vw,36px)','clamp(12px,1.8vw,24px)'];

function renderMulti(layer){
  const list = quotes;
  const n = list.length;
  const cols = Math.ceil(Math.sqrt(n));
  const rows = Math.ceil(n/cols);
  const cw=88/cols, rh=78/rows;
  let i=0;
  for(let r=0;r<rows&&i<n;r++){
    for(let c=0;c<cols&&i<n;c++){
      const q=list[i];
      const el=mk('div','t-multi');
      el.textContent=q.text;
      const col=MC[i%MC.length];
      el.style.color=col;
      el.style.fontSize=MS[i%MS.length];
      el.style.textShadow=`0 0 30px ${col}88`;
      el.style.left=(6+cw*c+cw/2+(Math.random()-.5)*6)+'vw';
      el.style.top=(10+rh*r+rh/2+(Math.random()-.5)*5)+'vh';
      el.style.transform='translate(-50%,-50%)';
      el.style.animationDelay=(i*.35)+'s';
      el.style.animationDuration=(3.5+i*.5)+'s';
      layer.appendChild(el);
      i++;
    }
  }
}

function mk(tag,cls){ const el=document.createElement(tag); el.className=cls; return el; }

// ── ADMIN LIST ──
function renderList(){
  const list=document.getElementById('qList');
  list.innerHTML='';
  if(!quotes.length){
    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--sub);font-size:12px;">还没有语句</div>';
    return;
  }
  const mn={nebula:'星云',rain:'流落',orbit:'轨道',pulse:'心跳',drift:'飘移',aurora:'极光'};
  quotes.forEach(q=>{
    const d=mk('div','qItem');
    if(q.id===selId) d.classList.add('sel');
    d.innerHTML=`
      <div class="qiText">${esc(q.text)}</div>
      <div class="qiMeta">
        <span class="mBadge m-${q.mode||'nebula'}">${mn[q.mode||'nebula']||'星云'}</span>
        ${q.multi?'<span style="font-size:10px">多显</span>':''}
      </div>
      <div class="qiActs">
        <button class="btnIcon" data-edit="${q.id}">编辑</button>
        <button class="btnIcon del" data-del="${q.id}">删除</button>
      </div>`;
    list.appendChild(d);
  });
  list.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation(); doEdit(b.dataset.edit);
  }));
  list.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation(); doDel(b.dataset.del);
  }));
}

function doEdit(id){
  const q=quotes.find(x=>x.id===id); if(!q) return;
  selId=id; isNew=false;
  document.getElementById('editText').value=q.text;
  curMode=q.mode||'nebula'; multiOn=!!q.multi;
  syncModeUI(); syncToggle(); renderList();
}

async function doDel(id){
  if(!confirm('确认删除这条语句？')) return;
  await deleteDoc(doc(db,COLL,id));
  if(selId===id){ selId=null; isNew=false; clearEd(); }
  toast('已删除');
}

function clearEd(){
  document.getElementById('editText').value='';
  curMode='nebula'; multiOn=false; syncModeUI(); syncToggle();
}

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── ADD NEW ──
document.getElementById('btnAddNew').addEventListener('click',()=>{
  selId=null; isNew=true; clearEd();
  document.getElementById('editText').focus();
  document.querySelectorAll('.qItem').forEach(el=>el.classList.remove('sel'));
});

// ── SAVE ──
document.getElementById('btnSave').addEventListener('click', async()=>{
  const text=document.getElementById('editText').value.trim();
  if(!text){ toast('请输入文字内容'); return; }
  const data={text, mode:curMode, multi:multiOn, updatedAt:Date.now()};
  if(selId && !isNew){
    await updateDoc(doc(db,COLL,selId), data);
    toast('已更新 ✓');
  } else {
    data.createdAt=Date.now();
    const ref=await addDoc(collection(db,COLL), data);
    selId=ref.id; isNew=false;
    toast('已保存 ✓');
  }
});

// ── MODE GRID ──
document.getElementById('modeGrid').addEventListener('click',e=>{
  const card=e.target.closest('.mCard'); if(!card) return;
  curMode=card.dataset.mode; syncModeUI();
});
function syncModeUI(){
  document.querySelectorAll('.mCard').forEach(c=>c.classList.toggle('act',c.dataset.mode===curMode));
}

// ── MULTI TOGGLE ──
document.getElementById('togMulti').addEventListener('click',()=>{ multiOn=!multiOn; syncToggle(); });
function syncToggle(){ document.getElementById('togMulti').classList.toggle('on',multiOn); }

// ── GEAR → LOGIN ──
document.getElementById('gearBtn').addEventListener('click',()=>{
  if(isAdmin){ showPanel(); return; }
  document.getElementById('loginBox').classList.add('show');
  setTimeout(()=>document.getElementById('pwdInput').focus(),50);
});

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pwdInput').addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });
document.getElementById('loginCancel').addEventListener('click',()=>{
  document.getElementById('loginBox').classList.remove('show');
  document.getElementById('pwdInput').value='';
  document.getElementById('lbErr').textContent='';
});

function tryLogin(){
  const v=document.getElementById('pwdInput').value;
  if(v===PWD){
    isAdmin=true;
    document.getElementById('loginBox').classList.remove('show');
    document.getElementById('pwdInput').value='';
    showPanel();
  } else {
    document.getElementById('lbErr').textContent='密码错误，请重试';
    document.getElementById('pwdInput').value='';
    document.getElementById('pwdInput').focus();
  }
}

function showPanel(){
  document.getElementById('adminPanel').classList.add('show');
  renderList();
}

document.getElementById('btnLogout').addEventListener('click',()=>{
  isAdmin=false;
  document.getElementById('adminPanel').classList.remove('show');
});
document.getElementById('btnPreview').addEventListener('click',()=>{
  document.getElementById('adminPanel').classList.remove('show');
});

// ── TOAST ──
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
</script>
</body>
</html>
